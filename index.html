<style>
  :root {
    --sidebar-bg:#0F0E0C; --main-bg:#F3F0EB; --card-bg:#fff;
    --text-primary:#141210; --text-secondary:#6B6560; --text-tertiary:#A8A39D;
    --accent:oklch(62% 0.14 65); --input-border:rgba(0,0,0,0.12);
    --radius-btn:9px; --radius-input:9px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  html,body,#root{height:100%;}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--main-bg);color:var(--text-primary);-webkit-font-smoothing:antialiased;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.12);border-radius:4px;}
  input,textarea,select{font-family:'Plus Jakarta Sans',sans-serif;outline:none;border:1.5px solid var(--input-border);border-radius:var(--radius-input);padding:10px 14px;font-size:13.5px;background:white;color:var(--text-primary);transition:border-color .15s,box-shadow .15s;width:100%;font-weight:400;}
  input:focus,textarea:focus,select:focus{border-color:#141210;box-shadow:0 0 0 3px rgba(20,18,16,.06);}
  input::placeholder{color:var(--text-tertiary);}
  textarea{resize:vertical;min-height:72px;line-height:1.6;}
  button{font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;border:none;}
  .modal-overlay{position:fixed;inset:0;background:rgba(8,7,5,.45);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:1000;animation:ovFadeIn .18s ease;}
  .modal-box{background:white;border-radius:18px;padding:32px;width:520px;max-width:95vw;max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(0,0,0,.18),0 0 0 1px rgba(0,0,0,.06);animation:modalSlideUp .22s cubic-bezier(.34,1.2,.64,1);}
  @keyframes ovFadeIn{from{opacity:0}to{opacity:1}}
  @keyframes modalSlideUp{from{transform:translateY(16px) scale(.98);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
  @keyframes slideInRight{from{transform:translateX(24px);opacity:0}to{transform:translateX(0);opacity:1}}
  @keyframes cardIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
  @keyframes loginIn{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  .btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--radius-btn);font-size:13px;font-weight:600;letter-spacing:.01em;transition:all .15s;white-space:nowrap;}
  .btn-primary{background:var(--text-primary);color:white;}
  .btn-primary:hover{background:#333;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.2);}
  .btn-primary:active{transform:translateY(0);box-shadow:none;}
  .btn-ghost{background:transparent;color:var(--text-secondary);border:1.5px solid var(--input-border);}
  .btn-ghost:hover{background:#F5F2EE;border-color:rgba(0,0,0,.18);color:var(--text-primary);}
  .btn-danger{background:#FEF2F2;color:#C0392B;border:1.5px solid #FECACA;}
  .btn-danger:hover{background:#FEE2E2;}
  .btn-sm{padding:7px 13px;font-size:12.5px;}
  .btn-icon{padding:8px;border-radius:8px;}
  /* Auth */
  .auth-screen{min-height:100vh;background:#0F0E0C;display:flex;align-items:center;justify-content:center;padding:20px;}
  .auth-card{width:400px;max-width:100%;animation:loginIn .4s cubic-bezier(.34,1.1,.64,1);}
  .auth-panel{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:28px;display:grid;gap:14px;}
  .auth-input{background:rgba(255,255,255,.06)!important;border:1.5px solid rgba(255,255,255,.1)!important;color:white!important;padding:13px 16px!important;font-size:15px!important;border-radius:11px!important;}
  .auth-input::placeholder{color:rgba(255,255,255,.25)!important;}
  .auth-input:focus{border-color:rgba(255,255,255,.35)!important;box-shadow:0 0 0 3px rgba(255,255,255,.06)!important;background:rgba(255,255,255,.09)!important;}
  .auth-btn{width:100%;padding:13px 20px!important;font-size:15px!important;border-radius:11px!important;font-weight:700!important;background:white!important;color:#0F0E0C!important;transition:all .15s!important;letter-spacing:-.01em!important;}
  .auth-btn:hover{background:#E8E4DF!important;transform:translateY(-1px)!important;box-shadow:0 8px 24px rgba(0,0,0,.3)!important;}
  .auth-btn:active{transform:translateY(0)!important;}
  .auth-btn:disabled{opacity:.5!important;cursor:not-allowed!important;transform:none!important;}
  .spinner{width:20px;height:20px;border:2px solid rgba(0,0,0,.15);border-top-color:#0F0E0C;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
  .totp-input{font-size:28px!important;letter-spacing:10px!important;text-align:center!important;font-weight:700!important;padding:16px!important;font-variant-numeric:tabular-nums!important;}

  /* ── PRINT VIEW (Quotes / Angebote) ── */
  .quote-print-page{background:#E8E4DF;padding:40px 20px;min-height:100vh;}
  .quote-paper{background:white;width:210mm;margin:0 auto;padding:22mm 20mm;box-shadow:0 12px 40px rgba(0,0,0,0.12);font-family:'Plus Jakarta Sans',sans-serif;font-size:10.5pt;color:#141210;line-height:1.55;print-color-adjust:exact;-webkit-print-color-adjust:exact;}
  .quote-paper h1,.quote-paper h2,.quote-paper h3{margin:0;}
  .quote-cover-break{display:none;}
  @media print{
    body{background:white!important;}
    .quote-print-page{background:white!important;padding:0!important;}
    .quote-paper{box-shadow:none!important;width:100%!important;margin:0!important;padding:16mm 14mm!important;}
    .quote-no-print{display:none!important;}
    .quote-cover-break{display:block;break-after:page;page-break-after:always;}
    .quote-section{break-inside:avoid;page-break-inside:avoid;}
    @page{size:A4;margin:0;}
  }
</style>

<div id="root"></div>

<script>
// ═══════════════════════════════════════════════════════════════
//  CRYPTO + TOTP  (plain JS, no framework)
// ═══════════════════════════════════════════════════════════════
const RECOVERY_EMAIL  = 'turleat@gmail.com';
const OWNER_EMAIL     = 'turlea@webars.at';
const SALT_KEY        = 'webars_salt_v1';
const VERIFY_KEY      = 'webars_verify_v1';
const TOTP_KEY        = 'webars_totp_v1';
const DATA_KEY        = 'webars_data_v1';
const INVITES_KEY     = 'webars_invites_v1';
const EMAIL_HASH_KEY  = 'webars_email_v1';
const VERIFY_STR      = 'WEBARS_AUTH_OK_2026';
const IDLE_TIMEOUT_MS = 15 * 60 * 1000;
// Device-key store for TOTP-only login
const DEVICE_KEY_STORE = 'webars_dkey_v1';
const TOTP_ENC_STORE   = 'webars_totp_denc_v1';
const PKEY_ENC_STORE   = 'webars_pkey_denc_v1';

// ─── Invite helpers ─────────────────────────────────────────────
async function sha256b64(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return toB64(buf);
}

// Invite token = base64url-encoded JSON containing master key + GitHub creds.
// Sharing this token with a member gives them access to the same team data.
async function createInviteToken(masterKey, ghSettings, label) {
  const masterB64 = await exportMasterKeyB64(masterKey);
  const payload = {
    v: 1,
    mk: masterB64,
    gh: ghSettings || null,
    label: label || '',
    created: new Date().toISOString()
  };
  // base64url so it's URL-safe
  return b64encode(JSON.stringify(payload)).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
}

function parseInviteToken(token) {
  try {
    if (!token) return null;
    let s = token.trim().replace(/-/g,'+').replace(/_/g,'/');
    while (s.length % 4) s += '=';
    const payload = JSON.parse(b64decode(s));
    if (payload.v !== 1 || !payload.mk) return null;
    return {
      masterKeyB64: payload.mk,
      ghSettings: payload.gh || null,
      label: payload.label || '',
      created: payload.created
    };
  } catch (e) { return null; }
}

// ─── AES helpers ────────────────────────────────────────────────
const toB64  = buf => btoa(String.fromCharCode(...new Uint8Array(buf)));
const fromB64 = b64 => Uint8Array.from(atob(b64), c => c.charCodeAt(0));
// UTF-8 safe base64 for strings (used by invite tokens and GitHub blobs)
const b64encode = str => btoa(unescape(encodeURIComponent(str)));
const b64decode = b64 => decodeURIComponent(escape(atob(b64.replace(/\s/g,''))));

async function deriveKey(password, salt) {
  const enc = new TextEncoder();
  const raw = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:210000, hash:'SHA-256' },
    raw, { name:'AES-GCM', length:256 }, false, ['encrypt','decrypt']
  );
}
async function aesEncrypt(key, obj) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const ct = await crypto.subtle.encrypt({name:'AES-GCM',iv}, key, new TextEncoder().encode(JSON.stringify(obj)));
  return { iv: toB64(iv), data: toB64(ct) };
}
async function aesDecrypt(key, {iv, data}) {
  const pt = await crypto.subtle.decrypt({name:'AES-GCM',iv:fromB64(iv)}, key, fromB64(data));
  return JSON.parse(new TextDecoder().decode(pt));
}
function getSalt() {
  const s = localStorage.getItem(SALT_KEY);
  if (s) return fromB64(s);
  const salt = crypto.getRandomValues(new Uint8Array(16));
  localStorage.setItem(SALT_KEY, toB64(salt));
  return salt;
}
function hasSetup()  { return !!localStorage.getItem(VERIFY_KEY) && !!localStorage.getItem(MASTER_KEY_STORE); }
function hasTOTP()   { return !!localStorage.getItem(TOTP_KEY); }

async function storeEmailHash(email) {
  const hash = await sha256b64('WEBARS_EMAIL_' + email.trim().toLowerCase());
  localStorage.setItem(EMAIL_HASH_KEY, hash);
}
async function checkEmailHash(email) {
  const stored = localStorage.getItem(EMAIL_HASH_KEY);
  if (!stored) return true; // legacy: no hash stored yet, allow
  const hash = await sha256b64('WEBARS_EMAIL_' + email.trim().toLowerCase());
  return hash === stored;
}
function hasEmailHash() { return !!localStorage.getItem(EMAIL_HASH_KEY); }

// ─── Master Key (shared team encryption key, wrapped per-user) ──
const MASTER_KEY_STORE = 'webars_master_v1';

async function generateMasterKey() {
  return crypto.subtle.generateKey({name:'AES-GCM',length:256}, true, ['encrypt','decrypt']);
}
async function exportMasterKeyB64(masterKey) {
  const raw = await crypto.subtle.exportKey('raw', masterKey);
  return toB64(raw);
}
async function importMasterKeyFromB64(b64) {
  return crypto.subtle.importKey('raw', fromB64(b64), {name:'AES-GCM'}, true, ['encrypt','decrypt']);
}

async function setupPassword(password, providedMasterKeyB64 = null) {
  const salt = getSalt();
  const wrapKey = await deriveKey(password, salt);
  // Verify string encrypted with wrapping key
  localStorage.setItem(VERIFY_KEY, JSON.stringify(await aesEncrypt(wrapKey, VERIFY_STR)));
  // Master key: imported (member) or freshly generated (owner)
  const masterKey = providedMasterKeyB64
    ? await importMasterKeyFromB64(providedMasterKeyB64)
    : await generateMasterKey();
  const masterB64 = await exportMasterKeyB64(masterKey);
  localStorage.setItem(MASTER_KEY_STORE, JSON.stringify(await aesEncrypt(wrapKey, masterB64)));
  return masterKey; // master key is the actual encryption key for all data
}

async function verifyPassword(password) {
  const salt = getSalt();
  const wrapKey = await deriveKey(password, salt);
  try {
    const v = await aesDecrypt(wrapKey, JSON.parse(localStorage.getItem(VERIFY_KEY)));
    if (v !== VERIFY_STR) return null;
    const mkRaw = localStorage.getItem(MASTER_KEY_STORE);
    if (!mkRaw) return null;
    const mkB64 = await aesDecrypt(wrapKey, JSON.parse(mkRaw));
    return await importMasterKeyFromB64(mkB64);
  } catch(e) { return null; }
}

async function getMasterKeyB64(masterKey) {
  return exportMasterKeyB64(masterKey);
}
async function saveTOTPSecret(key, secret) {
  localStorage.setItem(TOTP_KEY, JSON.stringify(await aesEncrypt(key, secret)));
}
async function loadTOTPSecret(key) {
  const raw = localStorage.getItem(TOTP_KEY);
  if (!raw) return null;
  try { return await aesDecrypt(key, JSON.parse(raw)); } catch(e) { return null; }
}
async function saveEncrypted(key, data) {
  const dataWithTs = {...data, _savedAt: Date.now()};
  const encrypted = await aesEncrypt(key, dataWithTs);
  localStorage.setItem(DATA_KEY, JSON.stringify(encrypted));
  // Auto-snapshot every 4 hours (no internet needed)
  const now = Date.now();
  if(now - _lastSnapAt > 4*3600*1000){ saveLocalSnapshot(encrypted); _lastSnapAt = now; }
  // Also push to GitHub if configured (best effort, don't block local save)
  if (_ghSettings) {
    try {
      const newSha = await ghPushFile(_ghSettings.token, _ghSettings.repo, _ghSettings.path, encrypted, _ghSha);
      _ghSha = newSha;
      localStorage.setItem(GH_SHA_KEY, newSha);
      _ghSyncState = {state:'ok', at:Date.now()};
      _notifySync && _notifySync();
      pushCrmSummary(data, _ghSettings).catch(()=>{});
    } catch(e) {
      _ghSyncState = {state:'error', message:e.message, at:Date.now()};
      _notifySync && _notifySync();
    }
  }
}
async function loadEncrypted(key) {
  // Try GitHub first if configured
  if (_ghSettings) {
    try {
      const fetched = await ghFetchFile(_ghSettings.token, _ghSettings.repo, _ghSettings.path);
      _ghSha = fetched.sha;
      localStorage.setItem(GH_SHA_KEY, fetched.sha); // persist SHA
      if (fetched.content) {
        localStorage.setItem(DATA_KEY, JSON.stringify(fetched.content));
        // Snapshot on every login-load so you always have a fresh restore point
        saveLocalSnapshot(fetched.content); _lastSnapAt = Date.now();
        _ghSyncState = {state:'ok', at:Date.now()};
        _notifySync && _notifySync();
        return await aesDecrypt(key, fetched.content);
      }
    } catch(e) {
      _ghSyncState = {state:'error', message:e.message, at:Date.now()};
      _notifySync && _notifySync();
      // GitHub offline — _ghSha already loaded from localStorage at startup, so SHA stays valid
    }
  }
  const raw = localStorage.getItem(DATA_KEY);
  if (!raw) return null;
  try { return await aesDecrypt(key, JSON.parse(raw)); } catch(e) { return null; }
}

// ─── GitHub Sync ────────────────────────────────────────────────
const GH_SETTINGS_KEY = 'webars_gh_settings_v1';
const GH_SHA_KEY = 'webars_gh_sha_v1';
const DATA_BACKUP_KEY = 'webars_data_backup_v1';
const SNAP_PREFIX = 'webars_snap_v2_';
const SNAP_SLOTS = 5;
let _lastSnapAt = 0;

function saveLocalSnapshot(encBlob) {
  try {
    let oi=0, ot=Infinity;
    for(let i=0;i<SNAP_SLOTS;i++){
      const r=localStorage.getItem(SNAP_PREFIX+i);
      if(!r){oi=i;ot=0;break;}
      try{const p=JSON.parse(r);if(p.t<ot){ot=p.t;oi=i;}}catch(e){}
    }
    localStorage.setItem(SNAP_PREFIX+oi, JSON.stringify({t:Date.now(),d:encBlob}));
  } catch(e){}
}
function getLocalSnapshots(){
  const r=[];
  for(let i=0;i<SNAP_SLOTS;i++){
    const raw=localStorage.getItem(SNAP_PREFIX+i);
    if(raw){try{const p=JSON.parse(raw);r.push({i,t:p.t,d:p.d});}catch(e){}}
  }
  return r.sort((a,b)=>b.t-a.t);
}

let _ghSettings = null;       // {token, repo, path}
let _ghSha = localStorage.getItem(GH_SHA_KEY) || null; // persisted across reloads
let _ghSummarySha = null;     // SHA for crm_summary.json (Jarvis API)
let _ghSyncState = {state:'idle'}; // {state: 'idle'|'ok'|'error', message, at}
let _notifySync = null;       // hook for UI updates

function setSyncListener(fn) { _notifySync = fn; }
function getSyncState() { return _ghSyncState; }
function hasGithubSettings() { return !!localStorage.getItem(GH_SETTINGS_KEY); }

async function saveGithubSettings(key, settings) {
  const enc = await aesEncrypt(key, settings);
  localStorage.setItem(GH_SETTINGS_KEY, JSON.stringify(enc));
  _ghSettings = settings;
}
async function loadGithubSettings(key) {
  const raw = localStorage.getItem(GH_SETTINGS_KEY);
  if (!raw) return null;
  try {
    const settings = await aesDecrypt(key, JSON.parse(raw));
    _ghSettings = settings;
    return settings;
  } catch(e) { return null; }
}
function clearGithubSettings() {
  localStorage.removeItem(GH_SETTINGS_KEY);
  _ghSettings = null;
  _ghSha = null;
  _ghSummarySha = null;
  _ghSyncState = {state:'idle'};
}

function buildCrmSummary(state) {
  return {
    updatedAt: new Date().toISOString(),
    contacts: (state.contacts||[]).map(c=>({
      id:c.id, firma:c.firma||'',
      email:c.fields?.email||'', telefon:c.fields?.telefon||'',
      ansprechpartner:c.fields?.ansprechpartner||'',
      address:c.fields?.address||'', zip:c.fields?.zip||'',
      city:c.fields?.city||'', country:c.fields?.country||'',
      taxId:c.fields?.taxId||'',
    })),
    invoices: (state.invoices||[]).map(inv=>({
      id:inv.id, number:inv.number, status:inv.status,
      firma:inv.contactSnapshot?.firma||'', email:inv.contactSnapshot?.email||'',
      total:quoteTotals(inv).total, date:inv.date, dueDate:inv.dueDate,
    })),
    quotes: (state.quotes||[]).map(q=>({
      id:q.id, number:q.number, status:q.status,
      firma:q.contactSnapshot?.firma||'', email:q.contactSnapshot?.email||'',
      total:quoteTotals(q).total, date:q.date,
    })),
  };
}
async function pushCrmSummary(state, ghSettings) {
  try {
    const summary = buildCrmSummary(state);
    if(!_ghSummarySha){
      const r=await fetch(`https://api.github.com/repos/${ghSettings.repo}/contents/crm_summary.json?ref=main`,
        {headers:{Authorization:`Bearer ${ghSettings.token}`}});
      if(r.ok){const j=await r.json();_ghSummarySha=j.sha||null;}
    }
    const body={
      message:`Update CRM summary · ${new Date().toISOString().slice(0,16).replace('T',' ')}`,
      content:btoa(unescape(encodeURIComponent(JSON.stringify(summary,null,2)))),
      branch:'main',
      ...(_ghSummarySha?{sha:_ghSummarySha}:{})
    };
    const r=await fetch(`https://api.github.com/repos/${ghSettings.repo}/contents/crm_summary.json`,
      {method:'PUT',headers:{Authorization:`Bearer ${ghSettings.token}`,'Content-Type':'application/json'},body:JSON.stringify(body)});
    if(r.ok){const j=await r.json();_ghSummarySha=j.content?.sha||null;}
    else _ghSummarySha=null;
  } catch(e){_ghSummarySha=null;}
}

async function ghValidateAccess(token, repo) {
  const r = await fetch(`https://api.github.com/repos/${repo}`, {
    headers: {Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json'}
  });
  if (r.status === 401) throw new Error('Token ungültig oder abgelaufen.');
  if (r.status === 404) throw new Error('Repository nicht gefunden oder Token hat keinen Zugriff.');
  if (!r.ok) throw new Error(`GitHub-Fehler ${r.status}`);
  const j = await r.json();
  if (!j.permissions || !j.permissions.push) throw new Error('Token hat keine Schreibrechte für dieses Repo.');
  return true;
}

async function ghFetchFile(token, repo, path) {
  const r = await fetch(`https://api.github.com/repos/${repo}/contents/${path}?ref=main`, {
    headers: {Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json'}
  });
  if (r.status === 404) return {content: null, sha: null};
  if (r.status === 401 || r.status === 403) {
    _ghSyncState = {state:'token_invalid', at:Date.now()};
    _notifySync && _notifySync();
    throw new Error('TOKEN_INVALID');
  }
  if (!r.ok) throw new Error(`Sync-Fehler ${r.status}`);
  const j = await r.json();
  let content = null;
  try { content = JSON.parse(b64decode(j.content)); } catch(e) { throw new Error('Datei konnte nicht gelesen werden.'); }
  return {content, sha: j.sha};
}

async function ghPushFile(token, repo, path, content, sha = null, message = 'Update CRM') {
  const body = {
    message: `${message} · ${new Date().toISOString().slice(0,16).replace('T',' ')}`,
    content: b64encode(JSON.stringify(content)),
    branch: 'main',
    ...(sha ? {sha} : {})
  };
  const r = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
    method: 'PUT',
    headers: {
      Authorization: `Bearer ${token}`,
      Accept: 'application/vnd.github+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  if (r.status === 409) {
    // SHA conflict — someone else pushed. Refetch and retry once.
    const {sha: latestSha} = await ghFetchFile(token, repo, path);
    if (latestSha && latestSha !== sha) {
      throw new Error('CONFLICT'); // caller can decide how to handle
    }
  }
  if (r.status === 401 || r.status === 403) {
    _ghSyncState = {state:'token_invalid', at:Date.now()};
    _notifySync && _notifySync();
    throw new Error('TOKEN_INVALID');
  }
  if (!r.ok) {
    const err = await r.json().catch(()=>({}));
    throw new Error(`Sync fehlgeschlagen: ${err.message || r.status}`);
  }
  const j = await r.json();
  return j.content.sha;
}

// Poll for updates from other team members
async function ghCheckForUpdates(key) {
  if (!_ghSettings) return null;
  try {
    const r = await fetch(`https://api.github.com/repos/${_ghSettings.repo}/contents/${_ghSettings.path}?ref=main`, {
      headers: {Authorization: `Bearer ${_ghSettings.token}`, Accept: 'application/vnd.github+json'}
    });
    if (!r.ok) return null;
    const j = await r.json();
    if (j.sha === _ghSha) return null; // no changes
    // SHA changed — decrypt and compare timestamps before overwriting
    const content = JSON.parse(b64decode(j.content));
    const decrypted = await aesDecrypt(key, content);
    const cloudTs = decrypted._savedAt || 0;
    // Read local timestamp to avoid overwriting newer local data with older cloud data
    const localRaw = localStorage.getItem(DATA_KEY);
    let localTs = 0;
    if (localRaw) { try { const ld = await aesDecrypt(key, JSON.parse(localRaw)); localTs = ld?._savedAt||0; } catch(e){} }
    if (cloudTs > 0 && cloudTs <= localTs) {
      // Cloud version is older — update SHA so we stop re-checking, but don't overwrite state
      _ghSha = j.sha;
      localStorage.setItem(GH_SHA_KEY, j.sha);
      return null;
    }
    // Cloud is newer (or no timestamp yet) — backup current local data first, then apply
    if (localRaw) localStorage.setItem(DATA_BACKUP_KEY, localRaw);
    _ghSha = j.sha;
    localStorage.setItem(GH_SHA_KEY, j.sha);
    localStorage.setItem(DATA_KEY, JSON.stringify(content));
    return decrypted;
  } catch(e) { return null; }
}

// ─── Device-key helpers (TOTP-only login) ───────────────────────
async function getOrCreateDeviceKey() {
  const stored = localStorage.getItem(DEVICE_KEY_STORE);
  if (stored) {
    return crypto.subtle.importKey('raw', fromB64(stored), 'AES-GCM', false, ['encrypt','decrypt']);
  }
  const key = await crypto.subtle.generateKey({name:'AES-GCM',length:256}, true, ['encrypt','decrypt']);
  const exp = await crypto.subtle.exportKey('raw', key);
  localStorage.setItem(DEVICE_KEY_STORE, toB64(exp));
  return key;
}
async function storeKeyForDevice(cryptoKey) {
  const dk = await getOrCreateDeviceKey();
  const rawKey = await crypto.subtle.exportKey('raw', cryptoKey);
  localStorage.setItem(PKEY_ENC_STORE, JSON.stringify(await aesEncrypt(dk, toB64(rawKey))));
}
async function storeTOTPAndKeyForDevice(totpSecret, cryptoKey) {
  const dk = await getOrCreateDeviceKey();
  localStorage.setItem(TOTP_ENC_STORE, JSON.stringify(await aesEncrypt(dk, totpSecret)));
  const rawKey = await crypto.subtle.exportKey('raw', cryptoKey);
  localStorage.setItem(PKEY_ENC_STORE, JSON.stringify(await aesEncrypt(dk, toB64(rawKey))));
}
async function loginWithTOTPCode(code) {
  const totpRaw = localStorage.getItem(TOTP_ENC_STORE);
  const pkeyRaw = localStorage.getItem(PKEY_ENC_STORE);
  if (!totpRaw || !pkeyRaw) return null; // not set up on this device
  const dk = await getOrCreateDeviceKey();
  try {
    const totpSecret = await aesDecrypt(dk, JSON.parse(totpRaw));
    const ok = await verifyTOTP(totpSecret, code);
    if (!ok) return false; // wrong code
    const b64key = await aesDecrypt(dk, JSON.parse(pkeyRaw));
    return crypto.subtle.importKey('raw', fromB64(b64key), {name:'AES-GCM',length:256}, false, ['encrypt','decrypt']);
  } catch(e) { return null; }
}
function hasDeviceKeySetup() { return !!localStorage.getItem(TOTP_ENC_STORE) && !!localStorage.getItem(PKEY_ENC_STORE); }

// ─── TOTP ───────────────────────────────────────────────────────
const B32 = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567';
function base32Encode(bytes) {
  let bits=0,val=0,out='';
  for(const b of bytes){val=(val<<8)|b;bits+=8;while(bits>=5){out+=B32[(val>>>(bits-5))&31];bits-=5;}}
  if(bits>0) out+=B32[(val<<(5-bits))&31];
  return out;
}
function base32Decode(s) {
  s=s.toUpperCase().replace(/=+$/,'');
  let bits=0,val=0;const out=[];
  for(const c of s){const i=B32.indexOf(c);if(i<0)continue;val=(val<<5)|i;bits+=5;if(bits>=8){out.push((val>>>(bits-8))&255);bits-=8;}}
  return new Uint8Array(out);
}
function generateTOTPSecret() {
  return base32Encode(crypto.getRandomValues(new Uint8Array(20)));
}
async function computeTOTP(secretB32, timeCounter) {
  const key = await crypto.subtle.importKey('raw', base32Decode(secretB32), {name:'HMAC',hash:'SHA-1'}, false, ['sign']);
  const buf = new ArrayBuffer(8);
  new DataView(buf).setUint32(4, timeCounter>>>0, false);
  const hmac = new Uint8Array(await crypto.subtle.sign('HMAC', key, buf));
  const off = hmac[19]&0xf;
  const code=((hmac[off]&0x7f)<<24|hmac[off+1]<<16|hmac[off+2]<<8|hmac[off+3])%1000000;
  return code.toString().padStart(6,'0');
}
async function verifyTOTP(secretB32, userCode) {
  const clean = userCode.replace(/\s/g,'');
  if(clean.length!==6) return false;
  const t = Math.floor(Date.now()/1000/30);
  for(let d=-1;d<=1;d++){
    if(await computeTOTP(secretB32,t+d)===clean) return true;
  }
  return false;
}
function makeOTPAuthURL(secret, email='WebArs CRM') {
  return `otpauth://totp/${encodeURIComponent('WebArs CRM')}:${encodeURIComponent(email)}?secret=${secret}&issuer=${encodeURIComponent('WebArs CRM')}&algorithm=SHA1&digits=6&period=30`;
}

function TOTPTimer() {

    const id = setInterval(()=>setSecs(30-(Math.floor(Date.now()/1000)%30)),1000);
    return ()=>clearInterval(id);
  },[]);
  const pct = secs/30;
  const r=11, circ=2*Math.PI*r;
  return (
    <div style={{display:'flex',alignItems:'center',gap:6,color:'rgba(255,255,255,0.4)',fontSize:12}}>
      <svg width="28" height="28" viewBox="0 0 28 28">
        <circle cx="14" cy="14" r={r} fill="none" stroke="rgba(255,255,255,0.1)" strokeWidth="2"/>
        <circle cx="14" cy="14" r={r} fill="none" stroke={secs<=5?'#F87171':'rgba(255,255,255,0.5)'} strokeWidth="2"
          strokeDasharray={circ} strokeDashoffset={circ*(1-pct)} strokeLinecap="round"
          style={{transform:'rotate(-90deg)',transformOrigin:'center',transition:'stroke-dashoffset 1s linear'}}/>
        <text x="14" y="18" textAnchor="middle" fontSize="9" fill="rgba(255,255,255,0.5)" fontFamily="monospace">{secs}</text>
      </svg>
      Code läuft in {secs}s ab
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
//  UNIFIED AUTH SCREEN
//  Schritte (NEU, vereinfacht):
//  Setup: 0 = Email + Invite + Passwort kombiniert  →  1 = TOTP (optional, überspringbar)
//  Login: 0 = Email  →  1 = Passwort ODER TOTP  (TOTP nicht mehr Pflicht)
// ══════════════════════════════════════════════════════════════════
function StepDots({current, total}) {
  return (
    <div style={{display:'flex',gap:6,justifyContent:'center',marginBottom:24}}>
      {Array.from({length:total}).map((_,i)=>(
        <div key={i} style={{width: i===current?20:6,height:6,borderRadius:99,background:i===current?'white':i<current?'rgba(255,255,255,0.4)':'rgba(255,255,255,0.15)',transition:'all 0.3s'}}/>
      ))}
    </div>
  );
}

function AuthScreen({mode, onDone, onReset, onSwitchMode, prefilledInvite}) {
  // mode: 'setup' | 'login'
  const isSetup    = mode === 'setup';

  const [step,       setStep]       = useState(0);
  const [email,      setEmail]      = useState('');
  const [invite,     setInvite]     = useState(prefilledInvite || '');
  const [pw,         setPw]         = useState('');
  const [pw2,        setPw2]        = useState('');
  const [code,       setCode]       = useState('');
  const [loginMode,  setLoginMode]  = useState('password');
  const [err,        setErr]        = useState('');
  const [busy,       setBusy]       = useState(false);
  const [shake,      setShake]      = useState(false);

  const [derivedKey,     setDerivedKey]     = useState(null);
  const [totpSecret,     setTotpSecret]     = useState('');
  const [otpUrl,         setOtpUrl]         = useState('');
  const [joinedViaInvite, setJoinedViaInvite] = useState(false);

  const doShake = msg => { setErr(msg); setShake(true); setTimeout(()=>setShake(false), 500); };

  // ── SETUP STEP 0 (combined): Email + (optional invite token) + Password ────────
  const submitCombinedSetup = async () => {
    setErr('');
    const trimmed = email.trim().toLowerCase();
    if (!trimmed.includes('@')) { doShake('Bitte gültige E-Mail-Adresse eingeben.'); return; }
    if (pw.length < 8)          { doShake('Passwort: mindestens 8 Zeichen.'); return; }
    if (pw !== pw2)             { doShake('Passwörter stimmen nicht überein.'); return; }

    setBusy(true);
    try {
      let masterKeyB64 = null;
      let importedGhSettings = null;

      // If invite token provided, parse it
      if (invite.trim()) {
        const parsed = parseInviteToken(invite.trim());
        if (!parsed) { doShake('Ungültiger Einladungs-Token.'); setBusy(false); return; }
        masterKeyB64 = parsed.masterKeyB64;
        importedGhSettings = parsed.ghSettings;
      } else if (trimmed !== OWNER_EMAIL.toLowerCase()) {
        doShake('Du benötigst einen Einladungs-Token vom Team-Owner.');
        setBusy(false); return;
      }

      await storeEmailHash(trimmed);
      // setupPassword now generates (owner) or imports (member) the master key
      const masterKey = await setupPassword(pw, masterKeyB64);

      // If invite carried GitHub settings, store them encrypted with master key
      if (importedGhSettings) {
        await saveGithubSettings(masterKey, importedGhSettings);
      }
      if (masterKeyB64) setJoinedViaInvite(true);

      const secret = generateTOTPSecret();
      setDerivedKey(masterKey);
      setTotpSecret(secret);
      setOtpUrl(makeOTPAuthURL(secret, trimmed));
      setStep(1);
    } catch(e) { console.error(e); setErr('Fehler. Bitte erneut versuchen.'); }
    setBusy(false);
  };

  // ── LOGIN STEP 0: Email check ──────────────────────────────────
  const submitLoginEmail = async () => {
    setErr(''); setBusy(true);
    const trimmed = email.trim().toLowerCase();
    if (!trimmed.includes('@')) { setErr('Bitte gültige E-Mail-Adresse eingeben.'); setBusy(false); return; }
    const ok = await checkEmailHash(trimmed);
    if (!ok) { doShake('Kein Zugang mit dieser E-Mail-Adresse.'); setBusy(false); return; }
    setStep(1);
    setBusy(false);
  };

  // ── SETUP STEP 1: Confirm TOTP ────────────────────────────────
  const submitTOTPSetup = async () => {
    setErr(''); setBusy(true);
    try {
      const ok = await verifyTOTP(totpSecret, code);
      if (!ok) { doShake('Ungültiger Code – bitte erneut versuchen.'); setCode(''); setBusy(false); return; }
      await saveTOTPSecret(derivedKey, totpSecret);
      // Only seed initial state for owners; invited members fetch from cloud (don't overwrite team data!)
      if (!joinedViaInvite) await saveEncrypted(derivedKey, DEFAULT_STATE);
      await storeTOTPAndKeyForDevice(totpSecret, derivedKey);
      onDone(derivedKey, DEFAULT_STATE);
    } catch(e) { setErr('Fehler. Bitte erneut versuchen.'); }
    setBusy(false);
  };

  // ── SETUP STEP 1: Skip TOTP ───────────────────────────────────
  const skipTOTPSetup = async () => {
    setErr(''); setBusy(true);
    try {
      if (!joinedViaInvite) await saveEncrypted(derivedKey, DEFAULT_STATE);
      // Persist key for auto-login on this device (parallels what the TOTP path does)
      try { await storeKeyForDevice(derivedKey); } catch(e) {}
      onDone(derivedKey, DEFAULT_STATE);
    } catch(e) { setErr('Fehler. Bitte erneut versuchen.'); }
    setBusy(false);
  };

  // ── LOGIN STEP 1: Authenticate with password ──────────────────
  const submitLoginPassword = async () => {
    setErr(''); setBusy(true);
    try {
      const key = await verifyPassword(pw);
      if (!key) { doShake('Falsches Passwort.'); setBusy(false); return; }
      const data = await loadEncrypted(key);
      // Store key for device auto-login (always, with or without TOTP)
      try { await storeKeyForDevice(key); } catch(e) {}
      // Refresh device-key store if TOTP exists (so TOTP-only login stays available)
      if (hasTOTP()) {
        try {
          const totpSec = await loadTOTPSecret(key);
          if (totpSec) await storeTOTPAndKeyForDevice(totpSec, key);
        } catch(e) {}
      }
      onDone(key, data || DEFAULT_STATE);
    } catch(e) { setErr('Fehler. Bitte erneut versuchen.'); }
    setBusy(false);
  };

  // ── LOGIN STEP 1: Authenticate with TOTP ─────────────────────
  const submitLoginTOTP = async () => {
    setErr(''); setBusy(true);
    try {
      if (!hasDeviceKeySetup()) {
        setErr('Authenticator-Login wurde auf diesem Gerät noch nicht eingerichtet. Bitte zuerst mit Passwort anmelden.');
        setBusy(false); return;
      }
      const result = await loginWithTOTPCode(code);
      if (result === false) { doShake('Ungültiger Code.'); setCode(''); setBusy(false); return; }
      if (!result) { setErr('Schlüssel nicht gefunden. Bitte mit Passwort anmelden.'); setBusy(false); return; }
      const data = await loadEncrypted(result);
      onDone(result, data || DEFAULT_STATE);
    } catch(e) { setErr('Fehler. Bitte erneut versuchen.'); }
    setBusy(false);
  };

  const totalSteps = isSetup ? 2 : 2;
  const subtitle = isSetup
    ? (['Konto einrichten', 'Authenticator (optional)'][step])
    : (['E-Mail eingeben', 'Anmelden'][step] || 'Anmelden');

  const canUseTOTPLogin = hasDeviceKeySetup();
  const needsInvite = isSetup && email.trim() && email.trim().toLowerCase() !== OWNER_EMAIL.toLowerCase();

  return (
    <div className="auth-screen">
      <div className="auth-card" style={{width: (isSetup && step===1) ? 440 : 400}}>
        <AuthLogo subtitle={subtitle} />
        <StepDots current={step} total={totalSteps} />

        <div className="auth-panel" style={{animation:shake?'shake 0.4s ease':'none'}}>

          {/* ── LOGIN STEP 0: Email ── */}
          {step === 0 && !isSetup && (<>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:'white',marginBottom:4}}>Willkommen zurück</div>
              <div style={{fontSize:12.5,color:'rgba(255,255,255,0.35)',lineHeight:1.6}}>Gib deine E-Mail-Adresse ein um fortzufahren.</div>
            </div>
            {!hasSetup() && (
              <div style={{fontSize:12.5,color:'rgba(255,200,100,0.85)',padding:'10px 12px',background:'rgba(255,200,100,0.08)',borderRadius:8,lineHeight:1.5,border:'1px solid rgba(255,200,100,0.18)'}}>
                ⚠ Auf diesem Gerät ist noch kein Konto eingerichtet. Du musst dich erst einrichten — entweder mit Einladungs-Link oder als Owner.
              </div>
            )}
            <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="deine@email.at"
              className="auth-input" type="email" autoFocus
              onKeyDown={e=>e.key==='Enter'&&submitLoginEmail()}/>
            {err && <div style={{fontSize:12.5,color:'#F87171',padding:'8px 12px',background:'rgba(248,113,113,0.1)',borderRadius:8}}>{err}</div>}
            <button className="btn auth-btn" onClick={submitLoginEmail} disabled={busy||!email.trim()}>
              {busy?<><span className="spinner" style={{borderTopColor:'#555',borderColor:'rgba(0,0,0,0.1)'}}></span> Prüfe…</>:'Weiter →'}
            </button>
            {onReset && (
              <button onClick={onReset} style={{background:'none',border:'none',color:'rgba(255,255,255,0.2)',fontSize:12,cursor:'pointer',textAlign:'center',width:'100%',paddingTop:4}}
                onMouseEnter={e=>e.currentTarget.style.color='rgba(255,255,255,0.45)'}
                onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.2)'}>
                Passwort vergessen? → {RECOVERY_EMAIL}
              </button>
            )}
          </>)}

          {/* ── SETUP STEP 0: All-in-one (Email + Invite + Password) ── */}
          {step === 0 && isSetup && (<>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:'white',marginBottom:4}}>Konto einrichten</div>
              <div style={{fontSize:12.5,color:'rgba(255,255,255,0.35)',lineHeight:1.6}}>
                {prefilledInvite
                  ? <>Du wurdest eingeladen 🎉 Erstelle dein Konto.</>
                  : <>Nur <strong style={{color:'rgba(255,255,255,0.55)'}}>{OWNER_EMAIL}</strong> kann ohne Einladung starten.</>
                }
              </div>
            </div>
            <div>
              <div style={{fontSize:11,fontWeight:600,color:'rgba(255,255,255,0.25)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.06em'}}>E-Mail-Adresse</div>
              <input value={email} onChange={e=>setEmail(e.target.value)} placeholder="deine@email.at" className="auth-input" type="email" autoFocus={!prefilledInvite}
                onKeyDown={e=>e.key==='Enter'&&submitCombinedSetup()}/>
            </div>
            {needsInvite && (
              <div>
                <div style={{fontSize:11,fontWeight:600,color:'rgba(255,255,255,0.25)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.06em',display:'flex',alignItems:'center',gap:6}}>
                  Einladungs-Token
                  {prefilledInvite && <span style={{color:'rgba(134,239,172,0.85)',textTransform:'none',letterSpacing:0,fontWeight:500,fontSize:10.5}}>· aus Link</span>}
                </div>
                <textarea value={invite} onChange={e=>setInvite(e.target.value)} placeholder="Token vom Team-Owner einfügen…" className="auth-input"
                  style={{fontFamily:'monospace',fontSize:11.5,minHeight:62,wordBreak:'break-all',lineHeight:1.4}}/>
                <div style={{fontSize:10.5,color:'rgba(255,255,255,0.3)',marginTop:5,lineHeight:1.5}}>Enthält Master-Schlüssel + Cloud-Sync-Zugang. Du wirst danach dein eigenes Passwort wählen.</div>
              </div>
            )}
            <div>
              <div style={{fontSize:11,fontWeight:600,color:'rgba(255,255,255,0.25)',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.06em'}}>Passwort</div>
              <PasswordInput value={pw} onChange={e=>setPw(e.target.value)} placeholder="Mindestens 8 Zeichen" autoFocus={!!prefilledInvite} onKeyDown={e=>e.key==='Enter'&&submitCombinedSetup()}/>
            </div>
            <PasswordInput value={pw2} onChange={e=>setPw2(e.target.value)} placeholder="Passwort bestätigen" onKeyDown={e=>e.key==='Enter'&&submitCombinedSetup()}/>
            {err && <div style={{fontSize:12.5,color:'#F87171',padding:'8px 12px',background:'rgba(248,113,113,0.1)',borderRadius:8}}>{err}</div>}
            <button className="btn auth-btn" onClick={submitCombinedSetup} disabled={busy||!email.trim()||!pw||!pw2}>
              {busy?<><span className="spinner" style={{borderTopColor:'#555',borderColor:'rgba(0,0,0,0.1)'}}></span> Einrichtung…</>:'Konto erstellen →'}
            </button>
            <div style={{fontSize:11,color:'rgba(255,255,255,0.25)',textAlign:'center',lineHeight:1.5}}>
              Daten werden mit deinem Passwort verschlüsselt. Keine Wiederherstellung möglich.
            </div>
          </>)}

          {/* ── SETUP STEP 1: TOTP (optional) ── */}
          {step === 1 && isSetup && (<>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:'white',marginBottom:4}}>Authenticator einrichten</div>
              <div style={{fontSize:12.5,color:'rgba(255,255,255,0.35)',lineHeight:1.6}}>
                <strong style={{color:'rgba(255,255,255,0.55)'}}>Optional</strong> — für extra Sicherheit. Du kannst das jetzt einrichten oder überspringen und später aktivieren.
              </div>
            </div>
            <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:14}}>
              <div style={{background:'white',padding:12,borderRadius:14,boxShadow:'0 4px 20px rgba(0,0,0,0.4)'}}>
                <QRCodeImage url={otpUrl}/>
              </div>
              <div style={{textAlign:'center',width:'100%'}}>
                <div style={{fontSize:10.5,color:'rgba(255,255,255,0.2)',marginBottom:5,textTransform:'uppercase',letterSpacing:'0.06em'}}>Manuell eingeben</div>
                <div style={{fontFamily:'monospace',fontSize:12,color:'rgba(255,255,255,0.45)',letterSpacing:'2px',wordBreak:'break-all',background:'rgba(255,255,255,0.05)',padding:'8px 10px',borderRadius:8,lineHeight:1.6}}>{totpSecret}</div>
              </div>
            </div>
            <div style={{borderTop:'1px solid rgba(255,255,255,0.08)',paddingTop:14}}>
              <div style={{fontSize:12,color:'rgba(255,255,255,0.35)',marginBottom:8}}>6-stelligen Code aus der App eingeben:</div>
              <input value={code} onChange={e=>setCode(e.target.value.replace(/\D/g,'').slice(0,6))}
                placeholder="000000" className="auth-input totp-input"
                onKeyDown={e=>e.key==='Enter'&&code.length===6&&submitTOTPSetup()}
                maxLength={6} inputMode="numeric" autoFocus/>
            </div>
            {err && <div style={{fontSize:12.5,color:'#F87171',padding:'8px 12px',background:'rgba(248,113,113,0.1)',borderRadius:8,textAlign:'center'}}>{err}</div>}
            <button className="btn auth-btn" onClick={submitTOTPSetup} disabled={busy||code.length!==6}>
              {busy ? <><span className="spinner" style={{borderTopColor:'#555',borderColor:'rgba(0,0,0,0.1)'}}></span> Prüfe…</> : 'Authenticator aktivieren →'}
            </button>
            <button onClick={skipTOTPSetup} disabled={busy} style={{background:'none',border:'none',color:'rgba(255,255,255,0.4)',fontSize:13,cursor:'pointer',textAlign:'center',width:'100%',padding:'4px 0',fontWeight:500,transition:'color 0.15s'}}
              onMouseEnter={e=>e.currentTarget.style.color='rgba(255,255,255,0.7)'}
              onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.4)'}>
              Überspringen — direkt einloggen
            </button>
          </>)}

          {/* ── LOGIN STEP 1: Password OR TOTP ── */}
          {!isSetup && step === 1 && (<>
            <div>
              <div style={{fontSize:15,fontWeight:700,color:'white',marginBottom:4}}>Anmelden</div>
              <div style={{fontSize:12.5,color:'rgba(255,255,255,0.35)',lineHeight:1.6}}>
                {hasTOTP() ? 'Wähle deine Anmeldemethode.' : 'Gib dein Passwort ein.'}
              </div>
            </div>

            {/* Method toggle — only when TOTP exists */}
            {hasTOTP() && (
              <div style={{display:'flex',background:'rgba(255,255,255,0.06)',borderRadius:10,padding:3,gap:2}}>
                {[{key:'password',label:'🔑 Passwort'},{key:'totp',label:'📱 Authenticator'}].map(m=>(
                  <button key={m.key} onClick={()=>{setLoginMode(m.key);setErr('');setCode('');setPw('');}}
                    style={{flex:1,padding:'9px 12px',borderRadius:8,border:'none',cursor:'pointer',fontSize:13,fontWeight:600,transition:'all 0.15s',
                      background:loginMode===m.key?'white':'transparent',
                      color:loginMode===m.key?'#0F0E0C':'rgba(255,255,255,0.4)'}}>
                    {m.label}
                  </button>
                ))}
              </div>
            )}

            {(loginMode === 'password' || !hasTOTP()) && (<>
              <PasswordInput value={pw} onChange={e=>setPw(e.target.value)} placeholder="Passwort" autoFocus
                onKeyDown={e=>e.key==='Enter'&&submitLoginPassword()}/>
              {err && <div style={{fontSize:12.5,color:'#F87171',padding:'8px 12px',background:'rgba(248,113,113,0.1)',borderRadius:8}}>{err}</div>}
              <button className="btn auth-btn" onClick={submitLoginPassword} disabled={busy||!pw}>
                {busy?<><span className="spinner" style={{borderTopColor:'#555',borderColor:'rgba(0,0,0,0.1)'}}></span> Prüfe…</>:'Anmelden →'}
              </button>
              {onReset && (
                <button onClick={onReset} style={{background:'none',border:'none',color:'rgba(255,255,255,0.2)',fontSize:12,cursor:'pointer',textAlign:'center',width:'100%',paddingTop:4}}
                  onMouseEnter={e=>e.currentTarget.style.color='rgba(255,255,255,0.5)'}
                  onMouseLeave={e=>e.currentTarget.style.color='rgba(255,255,255,0.2)'}>
                  Passwort vergessen? → {RECOVERY_EMAIL}
                </button>
              )}
            </>)}

            {hasTOTP() && loginMode === 'totp' && (<>
              {!canUseTOTPLogin && (
                <div style={{fontSize:12.5,color:'rgba(255,200,100,0.8)',padding:'10px 12px',background:'rgba(255,200,100,0.08)',borderRadius:8,lineHeight:1.5}}>
                  ⚠ Authenticator-Login wurde auf diesem Gerät noch nicht eingerichtet. Melde dich einmal mit Passwort an — danach funktioniert der Authenticator-Login automatisch.
                </div>
              )}
              <TOTPTimer/>
              <input value={code} onChange={e=>setCode(e.target.value.replace(/\D/g,'').slice(0,6))}
                placeholder="000000" className="auth-input totp-input"
                onKeyDown={e=>e.key==='Enter'&&code.length===6&&submitLoginTOTP()}
                maxLength={6} inputMode="numeric" autoFocus/>
              {err && <div style={{fontSize:12.5,color:'#F87171',padding:'8px 12px',background:'rgba(248,113,113,0.1)',borderRadius:8,textAlign:'center'}}>{err}</div>}
              <button className="btn auth-btn" onClick={submitLoginTOTP} disabled={busy||code.length!==6||!canUseTOTPLogin}>
                {busy?<><span className="spinner" style={{borderTopColor:'#555',borderColor:'rgba(0,0,0,0.1)'}}></span> Prüfe…</>:'Anmelden →'}
              </button>
            </>)}

            <button onClick={()=>{setStep(0);setCode('');setPw('');setErr('');}} style={{background:'none',border:'none',color:'rgba(255,255,255,0.2)',fontSize:12,cursor:'pointer',textAlign:'center',width:'100%'}}>← Zurück</button>
          </>)}

        </div>

        {onSwitchMode && step === 0 && (
          <div style={{textAlign:'center',marginTop:18,fontSize:12.5,color:'rgba(255,255,255,0.4)'}}>
            {isSetup ? (<>
              Schon ein Konto?{' '}
              <button onClick={onSwitchMode} style={{background:'none',border:'none',color:'white',fontSize:12.5,cursor:'pointer',padding:0,fontWeight:600,textDecoration:'underline',textUnderlineOffset:'3px'}}>
                Anmelden
              </button>
            </>) : (<>
              Noch kein Konto?{' '}
              <button onClick={onSwitchMode} style={{background:'none',border:'none',color:'white',fontSize:12.5,cursor:'pointer',padding:0,fontWeight:600,textDecoration:'underline',textUnderlineOffset:'3px'}}>
                Konto einrichten
              </button>
            </>)}
          </div>
        )}

        <AuthFooter/>
      </div>
    </div>
  );
}

// ── LOCK OVERLAY ─────────────────────────────────────────────────
function LockOverlay({onUnlock}) {
  const [lockMode,setLockMode]=useState('password'); // 'password' | 'totp'
  const [pw,setPw]=useState('');
  const [code,setCode]=useState('');
  const [err,setErr]=useState('');
  const [busy,setBusy]=useState(false);
  const [shake,setShake]=useState(false);
  const doShake=msg=>{setErr(msg);setShake(true);setTimeout(()=>setShake(false),500);};
  const canUseTOTP=hasDeviceKeySetup();

  const submitPassword=async()=>{
    setErr('');setBusy(true);
    const key=await verifyPassword(pw);
    if(!key){doShake('Falsches Passwort.');setBusy(false);return;}
    const data=await loadEncrypted(key);
    // Refresh device store
    try{const s=await loadTOTPSecret(key);if(s)await storeTOTPAndKeyForDevice(s,key);}catch(e){}
    onUnlock(key,data||DEFAULT_STATE);
  };
  const submitTOTP=async()=>{
    setErr('');setBusy(true);
    const result=await loginWithTOTPCode(code);
    if(result===false){doShake('Ungültiger Code.');setCode('');setBusy(false);return;}
    if(!result){setErr('Schlüssel nicht gefunden.');setBusy(false);return;}
    const data=await loadEncrypted(result);
    onUnlock(result,data||DEFAULT_STATE);
  };

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(10,9,7,0.95)',backdropFilter:'blur(20px)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{width:380,animation:'loginIn 0.3s ease',display:'grid',gap:20}}>
        <div style={{textAlign:'center'}}>
          <img src="logo.png" alt="WebArs" style={{width:48,height:48,borderRadius:'50%',marginBottom:12,opacity:0.9}}/>
          <div style={{fontWeight:700,fontSize:17,color:'white'}}>Gesperrt</div>
          <div style={{fontSize:13,color:'rgba(255,255,255,0.3)',marginTop:3}}>Anmelden um fortzufahren</div>
        </div>
        <div className="auth-panel" style={{animation:shake?'shake 0.4s ease':'none'}}>
          {/* Method toggle */}
          <div style={{display:'flex',background:'rgba(255,255,255,0.06)',borderRadius:10,padding:3,gap:2}}>
            {[{key:'password',label:'🔑 Passwort'},{key:'totp',label:'📱 Authenticator'}].map(m=>(
              <button key={m.key} onClick={()=>{setLockMode(m.key);setErr('');setCode('');setPw('');}}
                style={{flex:1,padding:'8px 10px',borderRadius:8,border:'none',cursor:'pointer',fontSize:12.5,fontWeight:600,transition:'all 0.15s',
                  background:lockMode===m.key?'white':'transparent',
                  color:lockMode===m.key?'#0F0E0C':'rgba(255,255,255,0.4)'}}>
                {m.label}
              </button>
            ))}
          </div>
          {lockMode==='password'&&(<>
            <PasswordInput value={pw} onChange={e=>setPw(e.target.value)} placeholder="Passwort" autoFocus onKeyDown={e=>e.key==='Enter'&&submitPassword()}/>
            {err&&<div style={{fontSize:12.5,color:'#F87171',textAlign:'center'}}>{err}</div>}
            <button className="btn auth-btn" onClick={submitPassword} disabled={busy||!pw}>
              {busy?<><span className="spinner" style={{borderTopColor:'#555',borderColor:'rgba(0,0,0,0.1)'}}></span> …</>:'Entsperren →'}
            </button>
          </>)}
          {lockMode==='totp'&&(<>
            {!canUseTOTP&&<div style={{fontSize:12.5,color:'rgba(255,200,100,0.8)',padding:'10px 12px',background:'rgba(255,200,100,0.08)',borderRadius:8,lineHeight:1.5}}>
              ⚠ Authenticator-Login noch nicht eingerichtet. Bitte mit Passwort entsperren.
            </div>}
            <TOTPTimer/>
            <input value={code} onChange={e=>setCode(e.target.value.replace(/\D/g,'').slice(0,6))} placeholder="000000" className="auth-input totp-input" onKeyDown={e=>e.key==='Enter'&&code.length===6&&submitTOTP()} maxLength={6} inputMode="numeric" autoFocus/>
            {err&&<div style={{fontSize:12.5,color:'#F87171',textAlign:'center'}}>{err}</div>}
            <button className="btn auth-btn" onClick={submitTOTP} disabled={busy||code.length!==6||!canUseTOTP}>
              {busy?<><span className="spinner" style={{borderTopColor:'#555',borderColor:'rgba(0,0,0,0.1)'}}></span> …</>:'Entsperren →'}
            </button>
          </>)}
        </div>
      </div>
    </div>
  );
}

// ── GitHub Sync Setup Modal ─────────────────────────────────────
function GithubSyncModal({cryptoKey, currentSettings, onSaved, onClose, onCleared}) {
  const [token, setToken] = useState(currentSettings?.token || '');
  const [repo, setRepo]   = useState(currentSettings?.repo || 'Tatstast/crm-system');
  const [path, setPath]   = useState(currentSettings?.path || 'data/crm-data.json');
  const [busy, setBusy]   = useState(false);
  const [err, setErr]     = useState('');
  const [info, setInfo]   = useState('');
  const [step, setStep]   = useState('form'); // form | conflict
  const [conflictData, setConflictData] = useState(null);

  const isUpdate = !!currentSettings;

  const test = async () => {
    setErr(''); setInfo(''); setBusy(true);
    try {
      await ghValidateAccess(token.trim(), repo.trim());
      setInfo('✓ Verbindung OK — Token und Repo gültig.');
    } catch(e) { setErr(e.message); }
    setBusy(false);
  };

  const save = async () => {
    setErr(''); setInfo(''); setBusy(true);
    try {
      await ghValidateAccess(token.trim(), repo.trim());
      const settings = {token: token.trim(), repo: repo.trim(), path: path.trim()};
      // Check if remote file exists with data
      const fetched = await ghFetchFile(settings.token, settings.repo, settings.path);
      if (fetched.content) {
        // Try to decrypt with current key — if works, we use it
        try {
          const decrypted = await aesDecrypt(cryptoKey, fetched.content);
          await saveGithubSettings(cryptoKey, settings);
          // store the sha so subsequent saves work
          _ghSha = fetched.sha;
          setInfo('✓ Verbunden — vorhandene Team-Daten geladen.');
          onSaved && onSaved(decrypted);
          return;
        } catch(e) {
          setErr('Datei existiert auf GitHub, kann aber mit deinem Passwort nicht entschlüsselt werden. Stimmt das Team-Passwort?');
          setBusy(false); return;
        }
      } else {
        // No file yet — push current local data as initial state
        await saveGithubSettings(cryptoKey, settings);
        // We need to push current state. Caller handles this via onSaved(null).
        onSaved && onSaved(null);
        return;
      }
    } catch(e) { setErr(e.message); }
    setBusy(false);
  };

  const disconnect = () => {
    if(!window.confirm('Cloud-Sync trennen? Lokale Daten bleiben erhalten.'))return;
    clearGithubSettings();
    onCleared && onCleared();
  };

  // ── Backup helpers ────────────────────────────────────────────
  const [backups, setBackups] = useState([]);
  const [backupBusy, setBackupBusy] = useState(false);
  const [backupErr, setBackupErr] = useState('');
  const [backupInfo, setBackupInfo] = useState('');

  const downloadCurrentBackup = async () => {
    setBackupErr(''); setBackupInfo(''); setBackupBusy(true);
    try {
      const s = currentSettings;
      if (!s) throw new Error('Erst Cloud-Sync verbinden.');
      const fetched = await ghFetchFile(s.token, s.repo, s.path);
      if (!fetched.content) throw new Error('Noch keine Daten in der Cloud.');
      const payload = {
        version: 1,
        savedAt: new Date().toISOString(),
        repo: s.repo,
        path: s.path,
        encryptedData: fetched.content,
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `webars-crm-backup-${new Date().toISOString().slice(0,10)}.json`;
      a.click();
      URL.revokeObjectURL(url);
      setBackupInfo('✓ Backup heruntergeladen.');
    } catch(e) { setBackupErr(e.message); }
    setBackupBusy(false);
  };

  const loadServerBackups = async () => {
    setBackupErr(''); setBackupBusy(true);
    try {
      const s = currentSettings;
      if (!s) throw new Error('Erst Cloud-Sync verbinden.');
      // List files in data/backups/
      const dir = (s.path || 'data/crm-data.json').split('/').slice(0,-1).join('/') + '/backups';
      const r = await fetch(`https://api.github.com/repos/${s.repo}/contents/${dir}`, {
        headers:{Authorization:`Bearer ${s.token}`, Accept:'application/vnd.github+json'}
      });
      if (r.status === 404) { setBackups([]); setBackupErr('Noch keine täglichen Backups vorhanden — werden ab dem ersten Tag (UTC 02:00) automatisch erstellt.'); setBackupBusy(false); return; }
      if (!r.ok) throw new Error(`Konnte Backups nicht laden (${r.status})`);
      const items = await r.json();
      const sorted = items.filter(i=>i.type==='file' && i.name.endsWith('.json')).sort((a,b)=>b.name.localeCompare(a.name));
      setBackups(sorted);
    } catch(e) { setBackupErr(e.message); }
    setBackupBusy(false);
  };

  const restoreFromBackup = async (backup) => {
    if (!window.confirm(`Wirklich auf Backup vom ${backup.name.replace(/.*\.(\d{4}-\d{2}-\d{2})\.json$/,'$1')} zurücksetzen?\n\nDie aktuelle Cloud-Datei wird durch das Backup überschrieben. (Das Backup selbst bleibt erhalten.)`)) return;
    setBackupErr(''); setBackupInfo(''); setBackupBusy(true);
    try {
      const s = currentSettings;
      // Fetch backup content
      const r = await fetch(`https://api.github.com/repos/${s.repo}/contents/${backup.path}`, {
        headers:{Authorization:`Bearer ${s.token}`, Accept:'application/vnd.github+json'}
      });
      if (!r.ok) throw new Error(`Backup konnte nicht gelesen werden (${r.status})`);
      const j = await r.json();
      const content = JSON.parse(b64decode(j.content));
      // Sanity-check: ensure we can decrypt (= same master key)
      try { await aesDecrypt(cryptoKey, content); }
      catch(e) { throw new Error('Backup kann mit deinem Passwort nicht entschlüsselt werden — vermutlich von einem anderen Team.'); }
      // Push as new current state
      const fetched = await ghFetchFile(s.token, s.repo, s.path);
      const newSha = await ghPushFile(s.token, s.repo, s.path, content, fetched.sha, `Restore from backup ${backup.name}`);
      _ghSha = newSha;
      setBackupInfo('✓ Wiederhergestellt — bitte Seite neu laden, um die Daten zu sehen.');
    } catch(e) { setBackupErr(e.message); }
    setBackupBusy(false);
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" onClick={e=>e.stopPropagation()} style={{width:520}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:18}}>
          <div>
            <h2 style={{fontSize:17,fontWeight:700}}>☁ Cloud-Sync (GitHub)</h2>
            <p style={{fontSize:12.5,color:'#A8A39D',marginTop:3,lineHeight:1.5}}>
              Daten verschlüsselt in einem GitHub-Repo speichern, damit Team-Mitglieder Zugriff haben.
            </p>
          </div>
          <button onClick={onClose} style={{background:'#F5F3F0',border:'none',borderRadius:8,padding:8,color:'#999',lineHeight:0}}><Icons.Close/></button>
        </div>

        <div style={{background:'#FFF7ED',border:'1px solid #FED7AA',borderRadius:10,padding:'10px 14px',marginBottom:18,fontSize:12.5,color:'#9A3412',lineHeight:1.55}}>
          <strong>Wichtig:</strong> Alle Team-Mitglieder brauchen <strong>denselben Token, dasselbe Repo</strong> und das <strong>gleiche Passwort</strong> wie du, um die Daten zu entschlüsseln. Teile diese drei Dinge sicher (z.B. via Passwort-Manager).
        </div>

        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:600,color:'#6B6560',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em'}}>GitHub Personal Access Token</div>
          <input value={token} onChange={e=>setToken(e.target.value)} type="password" placeholder="github_pat_…" style={{fontFamily:'monospace',fontSize:12.5}}/>
          <div style={{fontSize:11.5,color:'#A8A39D',marginTop:4,lineHeight:1.5}}>
            Erstellen unter <a href="https://github.com/settings/personal-access-tokens/new" target="_blank" rel="noopener" style={{color:'#3F3A35',fontWeight:600}}>github.com/settings/personal-access-tokens</a> · Berechtigungen: <em>Contents: Read and write</em>
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:11,fontWeight:600,color:'#6B6560',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em'}}>Repository (user/repo)</div>
          <input value={repo} onChange={e=>setRepo(e.target.value)} placeholder="Tatstast/crm-system" style={{fontFamily:'monospace'}}/>
        </div>
        <div style={{marginBottom:18}}>
          <div style={{fontSize:11,fontWeight:600,color:'#6B6560',marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em'}}>Datei-Pfad im Repo</div>
          <input value={path} onChange={e=>setPath(e.target.value)} placeholder="data/crm-data.json" style={{fontFamily:'monospace'}}/>
        </div>

        {info && <div style={{fontSize:12.5,color:'#16a34a',padding:'8px 12px',background:'#F0FDF4',borderRadius:8,marginBottom:12,border:'1px solid #BBF7D0'}}>{info}</div>}
        {err && <div style={{fontSize:12.5,color:'#C0392B',padding:'8px 12px',background:'#FEF2F2',borderRadius:8,marginBottom:12,border:'1px solid #FECACA'}}>{err}</div>}

        <div style={{display:'flex',gap:8,justifyContent:'space-between'}}>
          {isUpdate ? (
            <button className="btn btn-danger btn-sm" onClick={disconnect} disabled={busy}>Sync trennen</button>
          ) : <div></div>}
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-ghost" onClick={test} disabled={busy||!token||!repo}>Verbindung testen</button>
            <button className="btn btn-primary" onClick={save} disabled={busy||!token||!repo||!path}>
              {busy?'…':isUpdate?'Speichern':'Verbinden'}
            </button>
          </div>
        </div>

        {isUpdate && (
          <div style={{marginTop:14,paddingTop:14,borderTop:'1px solid #F0EDE8',fontSize:11.5,color:'#A8A39D'}}>
            Sync-Status: <span style={{fontWeight:600,color:getSyncState().state==='ok'?'#16a34a':getSyncState().state==='error'?'#C0392B':'#6B6560'}}>{getSyncState().state==='ok'?'OK · live':getSyncState().state==='error'?`Fehler: ${getSyncState().message||'unbekannt'}`:'wartet'}</span>
            {getSyncState().at && <span> · zuletzt {new Date(getSyncState().at).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})}</span>}
          </div>
        )}

        {isUpdate && (
          <div style={{marginTop:18,paddingTop:18,borderTop:'1px solid #F0EDE8'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
              <div>
                <div style={{fontSize:13,fontWeight:700,color:'#141210'}}>🛡 Backups</div>
                <div style={{fontSize:11.5,color:'#A8A39D',marginTop:2,lineHeight:1.5}}>
                  Tägliche Snapshots werden automatisch in <code style={{background:'#FAFAF8',padding:'1px 5px',borderRadius:4,fontSize:11}}>data/backups/</code> erstellt. Letzte 30 Tage werden behalten.
                </div>
              </div>
            </div>
            <div style={{display:'flex',gap:8,marginBottom:10}}>
              <button className="btn btn-ghost btn-sm" onClick={downloadCurrentBackup} disabled={backupBusy}>↓ Backup jetzt herunterladen</button>
              <button className="btn btn-ghost btn-sm" onClick={loadServerBackups} disabled={backupBusy}>{backupBusy?'…':'Verlauf anzeigen'}</button>
            </div>
            {backupInfo && <div style={{fontSize:12,color:'#16a34a',padding:'7px 11px',background:'#F0FDF4',borderRadius:7,marginBottom:8,border:'1px solid #BBF7D0'}}>{backupInfo}</div>}
            {backupErr && <div style={{fontSize:12,color:'#9A3412',padding:'7px 11px',background:'#FFF7ED',borderRadius:7,marginBottom:8,border:'1px solid #FED7AA'}}>{backupErr}</div>}
            {backups.length > 0 && (
              <div style={{maxHeight:200,overflowY:'auto',border:'1px solid #F0EDE8',borderRadius:8}}>
                {backups.map(b=>{
                  const dateMatch = b.name.match(/(\d{4}-\d{2}-\d{2})\.json$/);
                  const date = dateMatch ? dateMatch[1] : b.name;
                  return(
                    <div key={b.sha} style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 12px',borderBottom:'1px solid #F5F3F0',fontSize:12.5}}>
                      <div>
                        <div style={{fontWeight:600,color:'#141210'}}>{date}</div>
                        <div style={{fontSize:10.5,color:'#A8A39D',fontFamily:'monospace',marginTop:1}}>{b.name}</div>
                      </div>
                      <button className="btn btn-ghost btn-sm" style={{fontSize:11}} onClick={()=>restoreFromBackup(b)} disabled={backupBusy}>Wiederherstellen</button>
                    </div>
                  );
                })}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

//  TODO VIEW
// ══════════════════════════════════════════════════════════════════
const TODO_PRIORITIES = [{key:'hoch',label:'Hoch',color:'#ef4444',bg:'#FEF2F2'},{key:'mittel',label:'Mittel',color:'#f59e0b',bg:'#FFFBEB'},{key:'niedrig',label:'Niedrig',color:'#6B6560',bg:'#F5F3F0'}];

function TodoView({todos, onUpdate}) {
  const [newText, setNewText] = useState('');
  const [newDesc, setNewDesc] = useState('');
  const [newDate, setNewDate] = useState('');
  const [newPriority, setNewPriority] = useState('');
  const [showDone, setShowDone] = useState(false);
  const [filterPriority, setFilterPriority] = useState('');
  const [expandedId, setExpandedId] = useState(null);
  const today = new Date().toISOString().slice(0,10);

  const sortByPriority = (a,b) => {
    const pi=['hoch','mittel','niedrig'];
    const pa=pi.indexOf(a.priority),pb=pi.indexOf(b.priority);
    if(pa!==pb)return(pa===-1?99:pa)-(pb===-1?99:pb);
    return (a.dueDate||'9999').localeCompare(b.dueDate||'9999');
  };
  const open = todos.filter(t=>!t.done).sort(sortByPriority);
  const done = todos.filter(t=>t.done);

  const filteredOpen = filterPriority ? open.filter(t=>t.priority===filterPriority) : open;

  const counts = {
    hoch: open.filter(t=>t.priority==='hoch').length,
    mittel: open.filter(t=>t.priority==='mittel').length,
    niedrig: open.filter(t=>t.priority==='niedrig').length,
    keine: open.filter(t=>!t.priority).length,
  };

  const addTodo = () => {
    if(!newText.trim()) return;
    onUpdate([...todos,{id:uid(),text:newText.trim(),description:newDesc.trim(),done:false,priority:newPriority,dueDate:newDate,createdAt:today}]);
    setNewText(''); setNewDesc(''); setNewDate(''); setNewPriority('');
  };
  const toggle = id => onUpdate(todos.map(t=>t.id===id?{...t,done:!t.done,doneAt:!t.done?today:null}:t));
  const remove = id => onUpdate(todos.filter(t=>t.id!==id));
  const updateDesc = (id, description) => onUpdate(todos.map(t=>t.id===id?{...t,description}:t));

  const pMeta = key => TODO_PRIORITIES.find(p=>p.key===key);

  const TodoItem = ({t}) => {
    const overdue = !t.done && t.dueDate && t.dueDate < today;
    const expanded = expandedId === t.id;
    const [editingDesc, setEditingDesc] = useState(false);
    const [draftDesc, setDraftDesc] = useState(t.description||'');
    const priColor = t.priority ? pMeta(t.priority)?.color : '#E5E1DC';

    return(
      <div style={{background:'white',borderRadius:12,border:'1px solid rgba(0,0,0,0.07)',boxShadow:'0 1px 4px rgba(0,0,0,0.05)',marginBottom:8,transition:'opacity 0.15s, box-shadow 0.15s',opacity:t.done?0.55:1,borderLeft:`3px solid ${priColor}`,overflow:'hidden'}}>
        <div style={{display:'flex',alignItems:'flex-start',gap:12,padding:'12px 16px'}}>
          <button onClick={()=>toggle(t.id)} style={{marginTop:1,flexShrink:0,width:20,height:20,borderRadius:6,border:t.done?'none':'1.5px solid #D4CFC9',background:t.done?'#141210':'white',display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',transition:'all 0.15s'}}>
            {t.done&&<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><path d="M2 5.5l2.5 2.5 4.5-4.5" stroke="white" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/></svg>}
          </button>
          <div style={{flex:1,minWidth:0,cursor:'pointer'}} onClick={()=>setExpandedId(expanded?null:t.id)}>
            <div style={{fontSize:14,fontWeight:500,color:'#141210',lineHeight:1.4,textDecoration:t.done?'line-through':'none'}}>{t.text}</div>
            <div style={{display:'flex',alignItems:'center',gap:8,marginTop:4,flexWrap:'wrap'}}>
              {t.priority&&pMeta(t.priority)&&<span style={{fontSize:11,fontWeight:600,padding:'1px 7px',borderRadius:99,background:pMeta(t.priority).bg,color:pMeta(t.priority).color}}>{pMeta(t.priority).label}</span>}
              {t.dueDate&&<span style={{fontSize:11.5,color:overdue?'#B45309':'#A8A39D',fontWeight:overdue?600:400}}>{overdue?'⚠ ':''}{fmtDate(t.dueDate)}</span>}
              {t.description&&!expanded&&<span style={{fontSize:11.5,color:'#A8A39D',display:'flex',alignItems:'center',gap:4}}><Icons.Doc/>Beschreibung</span>}
            </div>
          </div>
          <button onClick={()=>setExpandedId(expanded?null:t.id)} style={{background:'none',border:'none',color:'#C8C3BD',cursor:'pointer',padding:'2px 6px',lineHeight:1,flexShrink:0,fontSize:12,transition:'transform 0.2s, color 0.15s',transform:expanded?'rotate(180deg)':'rotate(0)'}} onMouseEnter={e=>e.currentTarget.style.color='#6B6560'} onMouseLeave={e=>e.currentTarget.style.color='#C8C3BD'}>▾</button>

            onMouseEnter={e=>e.currentTarget.style.color='#C0392B'} onMouseLeave={e=>e.currentTarget.style.color='#DDD'}>×</button>
        </div>
        {expanded&&(
          <div style={{padding:'4px 16px 14px 48px',borderTop:'1px solid rgba(0,0,0,0.05)',background:'#FAFAF8'}}>
            <div style={{fontSize:11,fontWeight:600,color:'#A8A39D',textTransform:'uppercase',letterSpacing:'0.06em',marginTop:10,marginBottom:6}}>Beschreibung</div>
            {editingDesc?(
              <div>
                <textarea value={draftDesc} onChange={e=>setDraftDesc(e.target.value)} placeholder="Mehr Details zur Aufgabe…" style={{minHeight:80,fontSize:13}} autoFocus/>
                <div style={{display:'flex',gap:8,marginTop:8}}>
                  <button className="btn btn-primary btn-sm" onClick={()=>{updateDesc(t.id,draftDesc.trim());setEditingDesc(false);}}>Speichern</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>{setDraftDesc(t.description||'');setEditingDesc(false);}}>Abbrechen</button>
                </div>
              </div>
            ):(
              <div onClick={()=>setEditingDesc(true)} style={{fontSize:13,color:t.description?'#3F3A35':'#B0ABA5',lineHeight:1.5,whiteSpace:'pre-wrap',cursor:'text',padding:'6px 0',fontStyle:t.description?'normal':'italic'}}>{t.description||'Klick zum Hinzufügen einer Beschreibung…'}</div>
            )}
          </div>
        )}
      </div>
    );
  };

  return(
    <div style={{flex:1,overflowY:'auto',padding:28}}>
      {/* Add new todo */}
      <div style={{background:'white',borderRadius:14,padding:20,marginBottom:20,border:'1px solid rgba(0,0,0,0.07)',boxShadow:'0 1px 4px rgba(0,0,0,0.05)'}}>

          <input value={newText} onChange={e=>setNewText(e.target.value)} placeholder="Neue Aufgabe hinzufügen…"

          <button className="btn btn-primary" onClick={addTodo} disabled={!newText.trim()}><Icons.Plus/>Hinzufügen</button>
        </div>
        <textarea value={newDesc} onChange={e=>setNewDesc(e.target.value)} placeholder="Beschreibung (optional) — Details, Notizen, Kontext…" style={{marginBottom:10,minHeight:60,fontSize:13}}/>
        <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
          <div style={{fontSize:11.5,fontWeight:600,color:'#A8A39D',textTransform:'uppercase',letterSpacing:'0.06em',marginRight:4}}>Priorität:</div>
          <div style={{display:'flex',gap:6}}>
            {TODO_PRIORITIES.map(p=>{
              const active = newPriority === p.key;
              return(
                <button key={p.key} onClick={()=>setNewPriority(active?'':p.key)} style={{padding:'6px 12px',borderRadius:99,fontSize:12,fontWeight:600,border:`1.5px solid ${active?p.color:'transparent'}`,background:active?p.bg:'#F5F3F0',color:active?p.color:'#6B6560',cursor:'pointer',transition:'all 0.15s'}}>
                  {p.label}
                </button>
              );
            })}
          </div>
          <input type="date" value={newDate} onChange={e=>setNewDate(e.target.value)} style={{flex:1,minWidth:140,padding:'6px 12px',fontSize:12.5,background:'#F5F3F0',border:'1.5px solid transparent'}}/>
        </div>
      </div>

      {/* Priority overview */}
      {open.length > 0 && (
        <div style={{marginBottom:18}}>
          <div style={{fontSize:11,fontWeight:600,color:'#A8A39D',textTransform:'uppercase',letterSpacing:'0.06em',marginBottom:8,padding:'0 4px'}}>Prioritäten</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:10}}>
            {[
              {key:'hoch',label:'Hoch',count:counts.hoch,color:'#ef4444',bg:'#FEF2F2'},
              {key:'mittel',label:'Mittel',count:counts.mittel,color:'#f59e0b',bg:'#FFFBEB'},
              {key:'niedrig',label:'Niedrig',count:counts.niedrig,color:'#6B6560',bg:'#F5F3F0'},
              {key:'',label:'Alle',count:open.length,color:'#141210',bg:'#FAFAF8'},
            ].map(p=>{
              const active = filterPriority === p.key;
              return(
                <button key={p.key||'all'} onClick={()=>setFilterPriority(active && p.key ? '' : p.key)} style={{textAlign:'left',padding:'12px 14px',borderRadius:11,border:`1.5px solid ${active?p.color:'rgba(0,0,0,0.07)'}`,background:active?p.bg:'white',cursor:'pointer',transition:'all 0.15s',boxShadow:active?'none':'0 1px 4px rgba(0,0,0,0.04)'}}>
                  <div style={{fontSize:11.5,fontWeight:600,color:p.color,letterSpacing:'0.02em',marginBottom:2}}>{p.label}</div>
                  <div style={{fontSize:22,fontWeight:700,color:'#141210',letterSpacing:'-0.02em'}}>{p.count}</div>
                </button>
              );
            })}
          </div>
        </div>
      )}

      {/* Open tasks */}
      {open.length === 0 && done.length === 0 && (
        <div style={{textAlign:'center',padding:'80px 20px',color:'#C8C3BD'}}>
          <div style={{fontSize:44,marginBottom:16,opacity:.5}}>✓</div>
          <div style={{fontSize:16,fontWeight:600,color:'#C0BBB5'}}>Keine Aufgaben — alles erledigt!</div>
        </div>
      )}
      {open.length === 0 && done.length > 0 && (
        <div style={{textAlign:'center',padding:'40px 20px',color:'#C8C3BD'}}>
          <div style={{fontSize:32,marginBottom:12,opacity:.5}}>✓</div>
          <div style={{fontSize:15,fontWeight:600,color:'#C0BBB5'}}>Alle Aufgaben erledigt!</div>
        </div>
      )}
      {filteredOpen.length === 0 && open.length > 0 && filterPriority && (
        <div style={{textAlign:'center',padding:'40px 20px',color:'#C8C3BD',fontSize:14}}>Keine Aufgaben mit dieser Priorität.</div>
      )}
      {filteredOpen.map(t=><TodoItem key={t.id} t={t}/>)}

      {/* Done tasks */}
      {done.length > 0 && (
        <div style={{marginTop:16}}>
          <button onClick={()=>setShowDone(s=>!s)} style={{background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:6,fontSize:12.5,color:'#A8A39D',fontWeight:600,padding:'4px 0',marginBottom:10}}>
            <span style={{transition:'transform 0.2s',display:'inline-block',transform:showDone?'rotate(90deg)':'rotate(0)'}}>&rsaquo;</span>
            Erledigt ({done.length})
          </button>
          {showDone && done.map(t=><TodoItem key={t.id} t={t}/>)}
        </div>
      )}
    </div>
  );
}

function fmtRelativeTime(ts){
  const diff = Date.now() - new Date(ts).getTime();
  const m = Math.floor(diff/60000);
  if(m<1) return 'gerade eben';
  if(m<60) return `vor ${m} Min`;
  const h = Math.floor(m/60);
  if(h<24) return `vor ${h} Std`;
  const d = Math.floor(h/24);
  if(d<7) return `vor ${d} ${d===1?'Tag':'Tagen'}`;
  return new Date(ts).toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
}

    if(!newActivity.trim()) return;
    const updated = {...employee, activities:[...(employee.activities||[]),{id:uid(),timestamp:new Date().toISOString(),text:newActivity.trim()}]};
    onUpdate(updated);
    setNewActivity('');

    const d = new Date(a.timestamp).toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});

                    </div>

                      onMouseEnter={e=>e.currentTarget.style.color='#C0392B'} onMouseLeave={e=>e.currentTarget.style.color='#DDD'}>×</button>
