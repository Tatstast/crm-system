name: Daily CRM Backup
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create backup
        run: |
          DATE=$(date -u +%Y-%m-%d)
          if [ ! -f "data/crm-data.json" ]; then exit 0; fi
          mkdir -p data/backups
          cp data/crm-data.json "data/backups/crm-data.${DATE}.json"
          ls -1t data/backups/*.json 2>/dev/null | tail -n +31 | xargs -r rm -f
      - name: Commit
        run: |
          git config user.name "crm-backup-bot"
          git config user.email "crm-backup-bot@users.noreply.github.com"
          git add data/backups/
          git diff --staged --quiet || (git commit -m "backup: $(date -u +%Y-%m-%d)" && git push)